<!DOCTYPE html>
<html lang="en" ng-app="loginApp">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login - Encryption Management</title>

<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

<style>
/* (your same CSS — unchanged) */
body {
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    background: linear-gradient(-45deg, #1a1a1a, #0078ff, #9333ea, #111);
    background-size: 400% 400%;
    animation: gradientMove 15s ease infinite;
}
@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
.container {
    width:360px;
    padding:35px;
    border-radius:20px;
    background:rgba(0,0,0,0.5);
    text-align:center;
}
input {
    width:100%;
    padding:10px;
    margin:10px 0;
}
button {
    width:100%;
    padding:10px;
}
.error {
    color:red;
}
</style>

</head>

<body ng-controller="LoginController as loginCtrl">

<div class="container">
    <h2>Login</h2>

    <form ng-submit="loginCtrl.login()">
        <input type="text" ng-model="loginCtrl.username" placeholder="Username" required />
        <input type="password" ng-model="loginCtrl.password" placeholder="Password" required />

        <div class="error" ng-if="loginCtrl.error">{{loginCtrl.error}}</div>

        <button type="submit">
            {{ loginCtrl.isLoading ? 'Logging in...' : 'Login' }}
        </button>
    </form>
</div>

<script>
angular.module('loginApp', [])
.controller('LoginController', ['$http', '$window', function($http, $window){

    var vm = this;
    vm.username = '';
    vm.password = '';
    vm.error = null;
    vm.isLoading = false;

    // ✅ LOGIN FUNCTION (FIXED)
    vm.login = function(){
        vm.isLoading = true;
        vm.error = null;

        $http.post('https://encryption-learning-app.onrender.com/login', {
            username: vm.username,
            password: vm.password
        }).then(function(resp){

            vm.isLoading = false;

            if (resp.data && resp.data.status === 'success') {

                // ✅ ONLY store username (NOT password)
                localStorage.setItem('savedUsername', resp.data.username || vm.username);

                // ✅ admin check
                var role = resp.data.role || 'user';
                localStorage.setItem('isAdmin', role === 'admin' ? 'true' : 'false');

                // ✅ redirect FIXED (important)
                window.location.replace('/');

            } else {
                vm.error = resp.data.message || 'Login failed';
            }

        }).catch(function(){
            vm.isLoading = false;
            vm.error = 'Server error. Try again later.';
        });
    };

}]);
</script>

</body>
</html>
