<!DOCTYPE html>
<html lang="en" ng-app="loginApp">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Encryption Management</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        :root {
            --accent:#2563eb;
            --accent2:#9333ea;
        }

        html, body {
            height:100%;
            margin:0;
            font-family:"Poppins",Arial,Helvetica,sans-serif;
            color:#fff;
            overflow:hidden;
        }

        body {
            display:flex;
            align-items:center;
            justify-content:center;
            /* Simple moving gradient background */
            background: linear-gradient(-45deg, #1a1a1a, #0078ff, #9333ea, #111);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width:360px;
            padding:35px 30px;
            border-radius:20px;
            background:rgba(0,0,0,0.5);
            backdrop-filter:blur(10px);
            box-shadow:0 15px 40px rgba(0,0,0,0.6);
            text-align:center;
            transform-style:preserve-3d;
            transition:transform 0.4s ease;
            position:relative;
            overflow:hidden;
        }

        .container::before {
            content:"";
            position:absolute;
            inset:0;
            border-radius:20px;
            padding:2px;
            background:linear-gradient(135deg, var(--accent), var(--accent2), #06b6d4);
            -webkit-mask:
                linear-gradient(#000 0 0) content-box,
                linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderGlow 4s linear infinite;
        }

        @keyframes borderGlow {
            0% { filter:hue-rotate(0deg); }
            100% { filter:hue-rotate(360deg); }
        }

        h2 {
            margin-bottom:20px;
            font-size:24px;
            letter-spacing:1px;
            background:linear-gradient(90deg,#3b82f6,#8b5cf6);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        input {
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:8px;
            background:rgba(255,255,255,0.1);
            color:#fff;
            font-size:14px;
            position:relative;
            z-index:1;
        }

        /* Ensure text can be selected */
        input::selection {
            background: rgba(255,255,255,0.3);
            color: #fff;
        }

        input:focus {
            outline:none;
            background:rgba(37,99,235,0.15);
            box-shadow:0 0 15px rgba(37,99,235,0.5);
            transform:scale(1.02);
        }

        button {
            width:100%;
            padding:12px;
            margin-top:16px;
            border:none;
            border-radius:8px;
            font-weight:600;
            cursor:pointer;
            background:linear-gradient(90deg,var(--accent),var(--accent2));
            color:#fff;
            transition:all 0.4s ease;
            box-shadow:0 4px 15px rgba(37,99,235,0.5);
            position:relative;
            overflow:hidden;
        }

        button::before {
            content:"";
            position:absolute;
            inset:0;
            background:linear-gradient(120deg,rgba(255,255,255,0.4),rgba(255,255,255,0));
            transform:translateX(-100%);
            transition:transform 0.6s ease;
        }
        button:hover::before { transform:translateX(100%); }
        button:hover {
            transform:translateY(-3px) scale(1.03);
            box-shadow:0 6px 20px rgba(37,99,235,0.7);
        }

        button:disabled { opacity:0.7; cursor:not-allowed; }

        .error {
            color:#ff6b6b;
            margin-top:10px;
            opacity:0;
            animation:fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn { to { opacity:1; } }

        a {
            color:#93c5fd;
            text-decoration:none;
            transition:color 0.3s ease;
            cursor:pointer;
        }

        a:hover { color:#60a5fa; text-decoration:underline; }

        p { margin-top:14px; }
    </style>
</head>
<body ng-controller="LoginController as loginCtrl">
    <div class="container" id="tilt-card">
        <h2>Login</h2>
        <form ng-submit="loginCtrl.login()">
            <input type="text" ng-model="loginCtrl.username" placeholder="Username" required />
            <input type="password" ng-model="loginCtrl.password" placeholder="Password" required />
            <div class="error" ng-if="loginCtrl.error">{{loginCtrl.error}}</div>
            <button type="submit" ng-disabled="loginCtrl.isLoading">
                {{ loginCtrl.isLoading ? 'Logging in…' : 'Login' }}
            </button>
        </form>
        <p>Don't have an account? <a href="#" ng-click="loginCtrl.goRegister()">Register</a></p>
    </div>

    <script>
    angular.module('loginApp', [])
    .controller('LoginController', ['$http', '$window', function($http, $window){
        var vm = this;
        vm.username = '';
        vm.password = '';
        vm.isLoading = false;
        vm.error = null;

        // Login function
        vm.login = function(){
            vm.isLoading = true;
            vm.error = null;

            $http.post('https://encryption-learning-app.onrender.com/login', {
                username: vm.username,
                password: vm.password
            }).then(function(resp){
                vm.isLoading = false;
                if (resp.data && resp.data.status === 'success') {
                    localStorage.setItem('savedUsername', resp.data.username || vm.username);
                    localStorage.setItem('savedPassword', vm.password);
                    var role = resp.data.role || 'user';
                    localStorage.setItem('isAdmin', role === 'admin' ? 'true' : 'false');
                    if (resp.data.admin_token) localStorage.setItem('adminToken', resp.data.admin_token);
                    else localStorage.removeItem('adminToken');
                    $window.location.href = '/';
                } else {
                    vm.error = resp.data && resp.data.message ? resp.data.message : 'Login failed';
                }
            }).catch(function(err){
                vm.isLoading = false;
                if (err && err.status === 401) vm.error = 'Invalid username or password';
                else vm.error = 'Server error. Try again later.';
            });
        };

        // Navigate to register page
        vm.goRegister = function() {
            $window.location.href = 'register.html';
        };
    }]);

    // 3D Tilt Card
    const card = document.getElementById('tilt-card');
    document.addEventListener('mousemove', (e) => {
        const x = e.clientX / window.innerWidth - 0.5;
        const y = e.clientY / window.innerHeight - 0.5;
        card.style.transform = `rotateY(${x * 15}deg) rotateX(${y * -15}deg) scale(1.02)`;
    });
    document.addEventListener('mouseleave', () => {
        card.style.transform = 'rotateY(0deg) rotateX(0deg) scale(1)';
    });
    </script>
</body>
</html>
