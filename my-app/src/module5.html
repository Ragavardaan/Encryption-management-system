<!DOCTYPE html>
<html lang="en" ng-app="resourcesApp">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cryptography Resources</title>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* Body & background */
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#f7971e,#ffd200);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:#fff;
    overflow:hidden;
}

.background {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
    overflow:hidden;
}

.circle {
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.1);
    animation:float 15s infinite ease-in-out;
}

.circle:nth-child(1){ width:70vw; height:70vw; top:-30vw; left:-20vw; }
.circle:nth-child(2){ width:60vw; height:60vw; bottom:-25vw; right:-15vw; }
.circle:nth-child(3){ width:50vw; height:50vw; top:60%; left:70%; }

@keyframes float {
    0%,100% { transform:translate(0,0) rotate(0deg); }
    50% { transform:translate(20px,-20px) rotate(10deg); }
}

/* Container styling */
.container {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 40px;
    width: 90%;
    max-width: 600px;
    text-align: center;
    animation: slideUp 1s ease-out forwards;
    transform: translateY(30px);
    opacity: 0;
}

@keyframes slideUp {
    to { opacity:1; transform: translateY(0); }
}

/* Resource list */
ul {
    text-align:left;
    margin-top:20px;
    line-height:1.6;
    background: rgba(0,0,0,0.2);
    border-radius:10px;
    padding:15px;
    max-height:300px;
    overflow-y:auto;
}

ul li a {
    color: #ffd700;
    text-decoration: none;
    font-weight: bold;
}

ul li a:hover {
    text-decoration: underline;
}

/* Button */
button {
    padding: 10px 20px;
    border-radius: 25px;
    border:none;
    background: linear-gradient(90deg, #ff8c00, #ffda00);
    color:#000;
    font-weight:bold;
    cursor:pointer;
    margin-top:15px;
}
button:hover {
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
</style>
</head>
<body ng-controller="ResourcesController as resCtrl">

<div class="background">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
</div>

<div class="container">
    <h2><i class="fas fa-book"></i> Cryptography Resources</h2>
    <button ng-click="resCtrl.load()">Load Resources</button>
    <ul>
        <li ng-repeat="(title, url) in resCtrl.resources">
            <a href="{{url}}" target="_blank">{{title}}</a>
        </li>
    </ul>
</div>

<div style="margin-top: 20px; text-align: center;">
    <button onclick="window.location.href='../index.html'" 
        style="padding: 10px 25px; border-radius: 25px; border:none; background: linear-gradient(90deg, #6a11cb, #2575fc); color: white; font-weight: bold; cursor:pointer;">
    <i class="fas fa-home"></i> Back to Home
</button>
</div>


<script>
angular.module('resourcesApp',[])
.controller('ResourcesController',['$http',function($http){
    var vm = this;
    vm.resources = {};
    vm.load = function(){
        vm.resources = {
            "Khan Academy - Cryptography": "https://www.khanacademy.org/computing/computer-science/cryptography",
            "GeeksforGeeks - Cryptography": "https://www.geeksforgeeks.org/cryptography/",
            "Wikipedia - Cryptography": "https://en.wikipedia.org/wiki/Cryptography",
            "NIST Cryptography": "https://csrc.nist.gov/projects/cryptography"
        };
    };
}]);
</script>

</body>
</html>
