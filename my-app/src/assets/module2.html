<!DOCTYPE html>
<html lang="en" ng-app="rsaApp">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSA Encryption</title>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body {
    font-family:'Segoe UI',sans-serif;
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#6a11cb 0%,#2575fc 100%);
    color:white;
    overflow:hidden;
}
.background{
    position:fixed;top:0;left:0;width:100%;height:100%;
    z-index:-1;overflow:hidden;
}
.circle{
    position:absolute;border-radius:50%;background:rgba(255,255,255,0.1);
    animation:float 20s infinite ease-in-out;
}
.circle:nth-child(1){width:80vw;height:80vw;top:-30vw;left:-20vw;}
.circle:nth-child(2){width:60vw;height:60vw;bottom:-30vw;right:-15vw;}
.circle:nth-child(3){width:40vw;height:40vw;top:50%;left:70%;}
@keyframes float{
    0%,100%{transform:translate(0,0) rotate(0deg);}
    25%{transform:translate(-20px,20px) rotate(5deg);}
    50%{transform:translate(10px,-15px) rotate(-5deg);}
    75%{transform:translate(15px,10px) rotate(3deg);}
}

.container{
    width:90%;
    max-width:600px;
    text-align:center;
    padding:30px;
    background:rgba(255,255,255,0.12);
    border-radius:20px;
    backdrop-filter:blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    animation:slideUp 1s ease-out forwards;
    transform:translateY(30px);
    opacity:0;
    display:flex;
    flex-direction:column;
    align-items:center;
}
@keyframes slideUp{to{opacity:1;transform:translateY(0)}}

h1{margin-bottom:20px;font-size:1.8rem;}
textarea,input{
    width:100%;
    padding:10px;
    border-radius:15px;
    border:none;
    margin:10px 0;
    font-size:1rem;
    background:rgba(255,255,255,0.2);
    color:white;
    text-align:left;
}
textarea::placeholder,input::placeholder{color:rgba(255,255,255,0.7);}
.scroll-box{
    max-height:200px;
    overflow-y:auto;
    background:rgba(0,0,0,0.25);
    padding:10px;
    border-radius:10px;
    margin:10px 0;
    text-align:left;
}
button{
    padding:10px 20px;
    border:none;
    border-radius:25px;
    background:linear-gradient(135deg,#43cea2,#185a9d);
    color:white;
    font-weight:bold;
    cursor:pointer;
    margin:8px;
    transition:all 0.3s ease;
}
button:hover{
    transform:translateY(-3px);
    box-shadow:0 6px 15px rgba(0,0,0,0.3);
}
.key-label{font-weight:bold;margin-top:10px;display:block;}

.back-btn{
    width:60%;
    background:linear-gradient(90deg,#6a11cb,#2575fc);
    color:white;
    font-weight:bold;
    border:none;
    border-radius:25px;
    padding:12px;
    margin-top:25px;
    cursor:pointer;
    transition:transform 0.3s,box-shadow 0.3s;
}
.back-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 6px 15px rgba(0,0,0,0.3);
}
</style>
</head>
<body ng-controller="RSAController as rsaCtrl">

<div class="background">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
</div>

<div class="container">
    <h1><i class="fas fa-lock"></i> RSA Encryption</h1>

    <button ng-click="rsaCtrl.generateKeys()">Generate New Key Pair</button>

    <div class="scroll-box" ng-if="rsaCtrl.publicKey">
        <span class="key-label">Public Key:</span>
        <textarea rows="4" readonly>{{rsaCtrl.publicKey}}</textarea>
    </div>

    <div class="scroll-box" ng-if="rsaCtrl.privateKey">
        <span class="key-label">Private Key:</span>
        <textarea rows="4" readonly>{{rsaCtrl.privateKey}}</textarea>
    </div>

    <textarea ng-model="rsaCtrl.message" placeholder="Enter plaintext message"></textarea>
    <textarea ng-model="rsaCtrl.encryptPublicKey" placeholder="Paste public key for encryption"></textarea>
    <button ng-click="rsaCtrl.encrypt()">Encrypt</button>

    <div class="scroll-box" ng-if="rsaCtrl.cipherText">
        <b>Encrypted Message:</b><br>{{rsaCtrl.cipherText}}
    </div>

    <textarea ng-model="rsaCtrl.decryptPrivateKey" placeholder="Paste private key for decryption"></textarea>
    <textarea ng-model="rsaCtrl.decryptCipherText" placeholder="Paste ciphertext (base64) to decrypt"></textarea>
    <button ng-click="rsaCtrl.decrypt()">Decrypt</button>

    <div class="scroll-box" ng-if="rsaCtrl.decryptedText">
        <b>Decrypted Message:</b><br>{{rsaCtrl.decryptedText}}
    </div>

    <!-- Back Button inside container -->
    <button class="back-btn" onclick="window.location.href='/index.html'">
        <i class="fas fa-home"></i> Back to Home
    </button>
</div>

<script>
angular.module('rsaApp',[])
.controller('RSAController',['$http',function($http){
    var vm=this;
    vm.message='';
    vm.cipherText='';
    vm.decryptedText='';
    vm.publicKey='';
    vm.privateKey='';
    vm.encryptPublicKey='';
    vm.decryptPrivateKey='';
    vm.decryptCipherText='';

    vm.generateKeys = function(){
        $http.get('http://127.0.0.1:5000/rsa_keys')
        .then(function(res){
            vm.publicKey = res.data.public_key;
            vm.privateKey = res.data.private_key;
            vm.encryptPublicKey = vm.publicKey;
            vm.decryptPrivateKey = vm.privateKey;
        })
        .catch(()=>alert("Failed to generate key pair"));
    };

    vm.encrypt=function(){
        if(!vm.message){ alert("Enter message"); return; }
        if(!vm.encryptPublicKey){ alert("Paste or generate a public key"); return; }
        $http.post('http://127.0.0.1:5000/rsa_encrypt',{
            message: vm.message,
            public: vm.encryptPublicKey
        })
        .then(function(res){ vm.cipherText = res.data.cipher_text; vm.decryptedText=''; })
        .catch(()=>alert("Encryption failed"));
    };

    vm.decrypt=function(){
        if(!vm.decryptCipherText){ alert("Paste ciphertext to decrypt"); return; }
        if(!vm.decryptPrivateKey){ alert("Paste private key for decryption"); return; }
        $http.post('http://127.0.0.1:5000/rsa_decrypt',{
            cipher: vm.decryptCipherText,
            private: vm.decryptPrivateKey
        })
        .then(function(res){ vm.decryptedText = res.data.decrypted_text; })
        .catch(()=>alert("Decryption failed"));
    };
}]);
</script>

</body>
</html>
