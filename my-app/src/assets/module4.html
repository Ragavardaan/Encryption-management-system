<!DOCTYPE html>
<html lang="en" ng-app="dhApp">
<head>
    <meta charset="UTF-8">
    <title>Diffie-Hellman Key Exchange Visualization</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            overflow: hidden;
            color: white;
        }
        .steps-container {
            max-height: 400px;      
            overflow-y: auto;       
            padding-right: 10px;    
            margin-bottom: 20px;
        }
        .background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            animation: float 20s infinite ease-in-out;
        }

        .circle:nth-child(1) { width: 80vw; height: 80vw; top: -30vw; left: -20vw; animation-delay: 0s; }
        .circle:nth-child(2) { width: 60vw; height: 60vw; bottom: -30vw; right: -15vw; animation-delay: -5s; }
        .circle:nth-child(3) { width: 40vw; height: 40vw; top: 50%; left: 70%; animation-delay: -10s; }

        @keyframes float {
            0%, 100% { transform: translate(0,0) rotate(0deg); }
            25% { transform: translate(-20px,20px) rotate(5deg); }
            50% { transform: translate(10px,-15px) rotate(-5deg); }
            75% { transform: translate(15px,10px) rotate(3deg); }
        }

       
        h1 { text-align: center; margin: 30px 0; font-size: 2.5rem; text-shadow: 2px 2px 5px rgba(0,0,0,0.3); }

        
        .input-group { margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        input[type=number] { padding: 12px; border-radius: 25px; border: none; width: 120px; text-align: center; }
        button { padding: 12px 25px; border-radius: 25px; border: none; background: linear-gradient(90deg, #6a11cb, #2575fc); color: white; cursor: pointer; font-weight: bold; }
        button:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

       
        .step { background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); padding: 15px; margin: 10px auto; max-width: 600px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .alice { border-left: 6px solid #2575fc; }
        .bob { border-left: 6px solid #6a11cb; }
        .shared { border-left: 6px solid #28a745; }
    </style>
</head>
<body ng-controller="DHController as dhCtrl">


<div class="background">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
</div>

<h1>Diffie-Hellman Key Exchange</h1>

<div class="steps-wrapper" style="max-height: 60vh; overflow-y: auto; width: 100%; display: flex; flex-direction: column; align-items: center; padding-bottom: 20px;">
    <div ng-if="dhCtrl.steps.length > 0">
        <h2>Steps:</h2>
        <div ng-repeat="step in dhCtrl.steps track by $index" class="step"
             ng-class="{'alice': step.indexOf('Alice')>=0, 'bob': step.indexOf('Bob')>=0, 'shared': step.indexOf('match')>=0}">
            {{step}}
        </div>
    </div>

    <div ng-if="dhCtrl.sharedKey">
        <h3>Shared Key: {{dhCtrl.sharedKey}}</h3>
    </div>
</div>

<div class="input-group">
    <input type="number" ng-model="dhCtrl.P" placeholder="Prime P">
    <input type="number" ng-model="dhCtrl.G" placeholder="Generator G">
    <button ng-click="dhCtrl.simulate()">Simulate</button>
</div>


<div ng-if="dhCtrl.sharedKey">
    <h3>Shared Key: {{dhCtrl.sharedKey}}</h3>
</div>

<div style="margin-top: 20px; text-align: center;">
    <button onclick="window.location.href='../index.html'" 
        style="padding: 10px 25px; border-radius: 25px; border:none; background: linear-gradient(90deg, #6a11cb, #2575fc); color: white; font-weight: bold; cursor:pointer;">
    <i class="fas fa-home"></i> Back to Home
</button>
</div>


<script>
angular.module('dhApp', [])
.controller('DHController', ['$http', '$scope', '$timeout', function($http, $scope, $timeout){
    var vm = this;
    vm.P = '';
    vm.G = '';
    vm.steps = [];
    vm.sharedKey = '';

    vm.simulate = function(){
        if(!vm.P || !vm.G){
            alert("Please enter P and G.");
            return;
        }

        $http.post('https://encryption-learning-app.onrender.com/dh_simulate', {P: vm.P, G: vm.G})
        .then(function(response){
            vm.steps = [];
            let allSteps = response.data.steps;

            allSteps.forEach(function(step,index){
                $timeout(function(){ vm.steps.push(step); }, index*1000);
            });

            vm.sharedKey = response.data.shared_key_alice;
        })
        .catch(function(error){
            console.error("Error:", error);
            alert("Error connecting to backend!");
        });
    };
}]);
</script>

</body>
</html>
