<!DOCTYPE html>
<html lang="en" ng-app="symmetricApp">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Symmetric Encryption</title>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#11998e,#38ef7d);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:#fff;
    overflow:hidden;
}
.background{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;overflow:hidden}
.circle{position:absolute;border-radius:50%;background:rgba(255,255,255,0.1);animation:float 15s infinite ease-in-out}
.circle:nth-child(1){width:70vw;height:70vw;top:-30vw;left:-20vw}
.circle:nth-child(2){width:60vw;height:60vw;bottom:-25vw;right:-15vw}
.circle:nth-child(3){width:50vw;height:50vw;top:60%;left:70%}
@keyframes float{0%,100%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(20px,-20px) rotate(10deg)}}

.container{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:40px;
    width:90%;
    max-width:500px;
    text-align:center;
    animation:slideUp 1s ease-out forwards;
    transform:translateY(30px);
    opacity:0;
    display:flex;
    flex-direction:column;
    align-items:center;
}
@keyframes slideUp{to{opacity:1;transform:translateY(0)}}

h2{margin-bottom:20px}

input,select{
    width:100%;
    padding:12px;
    border-radius:30px;
    border:none;
    outline:none;
    font-size:1rem;
    margin-bottom:15px;
    text-align:center;
    background:rgba(255,255,255,0.2);
    color:#fff;
}
input::placeholder{color:rgba(255,255,255,0.7)}

button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    background:linear-gradient(135deg,#43cea2,#185a9d);
    color:white;
    font-size:1rem;
    font-weight:600;
    margin:10px 5px;
    transition:all 0.3s ease;
}
button:hover{transform:translateY(-3px);box-shadow:0 6px 15px rgba(0,0,0,0.2)}

.output{
    margin-top:20px;
    text-align:left;
    word-wrap:break-word;
    background:rgba(0,0,0,0.2);
    border-radius:10px;
    padding:15px;
    width:100%;
}
.back-btn{
    width:60%;
    background:linear-gradient(90deg,#6a11cb,#2575fc);
    color:white;
    font-weight:bold;
    border:none;
    border-radius:25px;
    padding:12px;
    margin-top:25px;
    cursor:pointer;
    transition:transform 0.3s,box-shadow 0.3s;
}
.back-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 6px 15px rgba(0,0,0,0.3);
}
</style>
</head>
<body ng-controller="SymmetricController as symCtrl">
<div class="background"><div class="circle"></div><div class="circle"></div><div class="circle"></div></div>

<div class="container">
    <h2><i class="fas fa-lock"></i> Symmetric Encryption</h2>
    <select ng-model="symCtrl.algo">
        <option value="AES">AES</option>
        <option value="DES">DES</option>
    </select>

    <!-- Encryption Section -->
    <input type="text" ng-model="symCtrl.plaintext" placeholder="Enter plaintext to encrypt">
    <button ng-click="symCtrl.encrypt()">Encrypt</button>

    <!-- Decryption Section -->
    <input type="text" ng-model="symCtrl.cipher" placeholder="Enter ciphertext (base64) to decrypt">
    <input type="text" ng-model="symCtrl.key" placeholder="Enter key (base64) to decrypt">
    <button ng-click="symCtrl.decrypt()">Decrypt</button>

    <!-- Output Section -->
    <div class="output" ng-if="symCtrl.cipher || symCtrl.decrypted">
        <div ng-if="symCtrl.key"><p><b>🔑 Key:</b> {{symCtrl.key}}</p></div>
        <div ng-if="symCtrl.cipher"><p><b>🔒 Cipher:</b> {{symCtrl.cipher}}</p></div>
        <div ng-if="symCtrl.decrypted"><p><b>📜 Decrypted:</b> {{symCtrl.decrypted}}</p></div>
    </div>

    <!-- Back to Home Button (inside container) -->
    <button class="back-btn" onclick="window.location.href='/index.html'">
        <i class="fas fa-home"></i>Back to Home
    </button>
</div>

<script>
angular.module('symmetricApp', []).controller('SymmetricController',['$http',function($http){
    var vm=this;
    vm.algo='AES';
    vm.plaintext='';
    vm.key='';
    vm.cipher='';
    vm.decrypted='';

    vm.encrypt=function(){
        $http.post("https://encryption-learning-app.onrender.com/symmetric/encrypt",{plaintext:vm.plaintext,algo:vm.algo})
        .then(function(res){
            vm.cipher=res.data.ciphertext;
            vm.key=res.data.key;
            vm.decrypted=''; // Clear previous decrypted text
        }).catch(()=>alert("Error connecting to backend"));
    };

    vm.decrypt=function(){
        $http.post("https://encryption-learning-app.onrender.comsymmetric/decrypt",{ciphertext:vm.cipher,key:vm.key,algo:vm.algo})
        .then(function(res){
            vm.decrypted=res.data.plaintext;
        }).catch(()=>alert("Decryption failed"));
    };
}]);
</script>
</body>
</html>
