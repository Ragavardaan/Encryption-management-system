<!DOCTYPE html>
<html lang="en" ng-app="homeApp">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dashboard - Encryption Management</title>

<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #0f0;
    background: black;
    overflow-x: hidden;
}
#matrix {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
}
header {
    text-align: center;
    padding: 60px 20px;
}
.cards {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}
.card {
    background: rgba(0,0,0,0.7);
    padding: 20px;
    border-radius: 10px;
    width: 220px;
    text-align: center;
}
.logout-btn {
    position: fixed;
    top: 20px;
    right: 20px;
}
</style>

<script>
/* ✅ SAFE LOGIN CHECK (NO LOOP) */
(function() {
    const user = localStorage.getItem('savedUsername');

    if (!user) {
        // small delay prevents flicker/loop
        setTimeout(() => {
            window.location.replace('/login');
        }, 50);
    }
})();
</script>

</head>

<body ng-controller="HomeController as homeCtrl">

<canvas id="matrix"></canvas>

<header>
    <h1>Encryption Management System</h1>
    <p>Secure your data with intelligence</p>

    <div id="adminSection" style="display:none;">
        <a href="/assets/admin.html">Admin Dashboard</a>
    </div>
</header>

<div class="cards">
    <div class="card" ng-repeat="module in homeCtrl.modules">
        <h3>{{module.title}}</h3>
        <p>{{module.description}}</p>
        <button ng-click="homeCtrl.openModule(module.link)">Open</button>
    </div>
</div>

<button class="logout-btn" onclick="logout()">Logout</button>

<script>
/* ✅ LOGOUT FIX */
function logout() {
    localStorage.clear();
    window.location.replace('/login');
}

/* ✅ ADMIN BUTTON CONTROL */
window.onload = function () {
    if (localStorage.getItem('isAdmin') === 'true') {
        document.getElementById('adminSection').style.display = 'block';
    }
};
</script>

<script>
angular.module('homeApp', [])
.controller('HomeController', ['$window', function($window){
    var vm = this;

    vm.modules = [
        { title: "Symmetric Encryption", description: "AES & DES", link: "/assets/module1.html" },
        { title: "RSA Encryption", description: "Public key crypto", link: "/assets/module2.html" },
        { title: "File Encryption", description: "Secure files", link: "/assets/module3.html" },
        { title: "Key Exchange", description: "Diffie-Hellman", link: "/assets/module4.html" },
        { title: "Resources", description: "Learn crypto", link: "/assets/module5.html" }
    ];

    vm.openModule = function(link) {
        $window.location.href = link;
    };
}]);
</script>

<script>
/* MATRIX EFFECT */
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
const fontSize = 16;
const columns = Math.floor(canvas.width / fontSize);
const drops = Array(columns).fill(1);

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#0f0";
    ctx.font = fontSize + "px monospace";

    drops.forEach((y, i) => {
        const text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text, i * fontSize, y * fontSize);

        if (y * fontSize > canvas.height && Math.random() > 0.975)
            drops[i] = 0;

        drops[i]++;
    });
}

setInterval(draw, 35);

window.addEventListener('resize', resizeCanvas);
</script>

</body>
</html>
